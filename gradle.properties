# Gradle properties for HabitFlow
# Pin Gradle JVM to JRE 17 (Gradle 8.x requires JDK ≤ 21; Temurin 25 is too new).
# Using the JRE bundled with the VS Code Java extension.
org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home

# Performance
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# Kotlin / Compose
kotlin.code.style=official
android.useAndroidX=true
